<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
background:#111827;
color:white;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
}

.card{
background:#1f2937;
padding:15px;
margin-top:10px;

}

img{
width:100%;
max-width:300px;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<h1>MULTI PANEL KEYS</h1>

<p>Digital Key Store</p>

<button onclick="showProducts()">Products</button>
<button onclick="showSupport()">Support</button>

<div id="content"></div>

<script>

const SUPABASE_URL =
"https://aytgkjahrqprtcedcavl.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5dGdramFocnFwcnRjZWRjYXZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjEwMzEsImV4cCI6MjA5NjkzNzAzMX0.6UjwIAp4kVasiHlyb0Ziwm3S7H0Z00iuFXVdF0RE-II";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function showProducts(){

document.getElementById("content").innerHTML =
"<p>Loading Products...</p>";

const { data, error } = await supabase
.from("products")
.select("*")

if(error){
document.getElementById("content").innerHTML =
"<p>Error Loading Products</p>";
return;
}

let html = "";

data.forEach(product => {

html += `
<div class="card">

${product.image_url ?
`<img src="${product.image_url}">`
: ""}

<h3>${product.name}</h3>

<p>${product.description || ""}</p>

<h2>₹${product.price || 0}</h2>

</div>
`;

});

document.getElementById("content").innerHTML = html;

}

function showSupport(){

document.getElementById("content").innerHTML = `
<div class="card">
<h3>Support</h3>
<p>Telegram: @mr_shoaib_gamer</p>
</div>
`;

}

showProducts();

</script>

</body>
</html>
