<!DOCTYPE html>
<html>
<head>
<title>INFINITE STORE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>INFINITE STORE</h1>

<p>Digital Key Store</p>

<button onclick="showProducts()">Products</button>
<button onclick="showSupport()">Support</button>

<div id="content"></div>

<script>
const supabaseUrl = "https://aytgkjahrqprtcedcavl.supabase.co";

const supabaseKey = "sb_publishable_jcBP1v7sUcCGIWJgQ433qA__R1otIa0";
const supabase = window.supabase.createClient(
supabaseUrl,
supabaseKey
);


async function showProducts() {

const { data, error } = await supabase
.from('products')
.select('*');

if(error){
document.getElementById("content").innerHTML =
"<h2>Error Loading Products</h2>";
return;
}

let html = "<h2>Products</h2>";

data.forEach(product => {
html += `
<div style="border:1px solid #ccc;padding:10px;margin:10px 0;">
<h3>${product.name}</h3>
<p>Price: ₹${product.price}</p>
<p>${product.description || ""}</p>
</div>
`;
});

document.getElementById("content").innerHTML = html;
}


alert("Script Loaded");
console.log("Supabase Connected");
</script>

</body>
</html>
