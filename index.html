<!DOCTYPE html>
<html>
<head>

<script>

document.getElementById("content").innerHTML = `

<div class="card">
<h3>BGMI 325 UC</h3>
<p>₹399</p>
</div>

<div class="card">
<h3>BGMI 660 UC</h3>
<p>₹799</p>

}

function showSupport() {

document.getElementById("content").innerHTML = `

<div class="card">

</div>

`;

}
